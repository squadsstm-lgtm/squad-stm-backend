# Server
server.port=${SERVER_PORT:8080}

# Application
spring.application.name=Squad Backend
spring.mvc.pathmatch.use-trailing-slash-match=true

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://squads_stm:SquadStm2025@squadcluster.kmqctuy.mongodb.net/squads_stm?retryWrites=true&w=majority}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:squads_stm}

# JWT
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-mateen-squad-2025}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.invite-expiration=${JWT_INVITE_EXPIRATION:604800000}
app.invite-code-length=${APP_INVITE_CODE_LENGTH:22}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_XXXX}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_XXXX}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:your-webhook-secret-from-stripe-dashboard}

# Email (Domain: info@squadstm.co.uk - Ionos)
spring.mail.host=${SPRING_MAIL_HOST:smtp.ionos.co.uk}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:info@squadstm.co.uk}
spring.mail.password=${SPRING_MAIL_PASSWORD:change-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM:info@squadstm.co.uk}

# URLs
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080/api}

# CORS allowed origins (comma-separated)
app.cors-origins=${APP_CORS_ORIGINS:http://localhost:4200}

# Proxy support (detects HTTPS behind load balancer)
server.forward-headers-strategy=framework

# Firebase — file-based locally, env-var-based on Azure
firebase.config-path=${FIREBASE_CONFIG_PATH:classpath:serviceAccountKey.json}
firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}

# Logging
logging.level.com.squad=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.data.mongodb=WARN

# Encryption (AES-256, base64-encoded 32-byte key)
app.encryption.key=${APP_ENCRYPTION_KEY:change-me-base64-key}

# Cookie security (set true in production behind HTTPS)
app.cookie-secure=${APP_COOKIE_SECURE:false}
